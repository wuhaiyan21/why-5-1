services:
  logalyzer-batch:
    build:
      context: .
      dockerfile: Dockerfile
    image: logalyzer:batch
    environment:
      - MODE=batch
      - BATCH_CONFIG=/app/batch-config.yaml
      - BATCH_OUTPUT=/app/batch-results
      - BATCH_BASE_CONFIG=
    volumes:
      - ./sample-logs/prod/today:/logs/prod/today:ro
      - ./sample-logs/prod/yesterday:/logs/prod/yesterday:ro
      - ./sample-logs/staging:/logs/staging:ro
      - ./sample-logs/dev:/logs/dev:ro
      # 运行后挂载目录下将包含:
      #   ./batch-results/summary.csv              汇总对比表
      #   ./batch-results/comparison_report.html   HTML 对比报告
      #   ./batch-results/prod-env-today/          各组子目录
      #   ./batch-results/prod-env-yesterday/
      #   ./batch-results/staging-env/
      #   ./batch-results/dev-env/
      #   ./batch-results/nonexistent-env/
      - ./batch-results:/app/batch-results
    command: []
    # 可通过 command 传递额外参数，例如:
    # command: ["--verbose"]
    # command: ["--no-html"]
    # command: ["--verbose", "--no-html"]
